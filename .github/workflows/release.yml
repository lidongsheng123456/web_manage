name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-backend:
    name: 构建后端
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven 构建
        run: mvn clean package -DskipTests

      - name: 上传后端产物
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: web_admin/target/*.jar

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_ui
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_ui/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建前端
        run: npm run build

      - name: 上传前端产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web_ui/dist

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 下载后端产物
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: artifacts/backend

      - name: 下载前端产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend

      - name: 打包前端
        run: tar -czf web_ui-dist.tar.gz -C artifacts/frontend .

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            artifacts/backend/*.jar
            web_ui-dist.tar.gz
