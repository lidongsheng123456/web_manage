name: CI Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-backend:
    name: 构建后端
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven 构建
        run: mvn clean package -DskipTests

      - name: 上传后端产物
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: web_admin/target/*.jar
          retention-days: 7

  build-frontend:
    name: 构建前端
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_ui
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_ui/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建前端
        run: npm run build

      - name: 上传前端产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web_ui/dist
          retention-days: 7
