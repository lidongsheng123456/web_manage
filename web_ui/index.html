<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="东神脚手架 - 基于 Spring Boot 3 + Vue 3 的全栈管理系统">
  <link rel="icon" href="/src/assets/img/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/src/assets/css/global.css">
  <title>东神脚手架</title>
</head>
<body>
  <noscript>
    <strong>东神脚手架需要启用 JavaScript 才能正常运行，请在浏览器设置中开启。</strong>
  </noscript>
  <div id="loader-wrapper">
    <div class="loader-grid"></div>
    <div class="loader-glow"></div>
    <div class="loader-particles">
      <span class="lp" style="--x:12%;--y:18%;--d:6s;--s:0.6"></span>
      <span class="lp" style="--x:28%;--y:72%;--d:8s;--s:0.35"></span>
      <span class="lp" style="--x:52%;--y:12%;--d:7s;--s:0.7"></span>
      <span class="lp" style="--x:72%;--y:58%;--d:9s;--s:0.45"></span>
      <span class="lp" style="--x:88%;--y:32%;--d:6.5s;--s:0.6"></span>
      <span class="lp" style="--x:38%;--y:88%;--d:8.5s;--s:0.3"></span>
      <span class="lp" style="--x:62%;--y:42%;--d:7.5s;--s:0.5"></span>
      <span class="lp" style="--x:18%;--y:52%;--d:9.5s;--s:0.25"></span>
    </div>
    <div class="loader-content">
      <div class="loader-ring">
        <div class="loader-ring-track"></div>
        <img src="/src/assets/img/logo.svg" alt="Logo" class="loader-logo">
      </div>
      <h1 class="loader-brand">东神脚手架</h1>
      <p class="loader-desc">正在加载系统资源<span class="loader-dots"></span></p>
      <div class="loader-bar"><div class="loader-bar-inner"></div></div>
      <p class="loader-version">v1.0 · Spring Boot 3 + Vue 3</p>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
